<!doctype html>

<html lang="{{ site.lang | default: " en-US" }}">

  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    
    <!-- Favicon-->
    <link rel="shortcut icon" href="{{'/assets/data/rs-favicon_32x32.png' | relative_url}}" />
    <!-- Core theme CSS (includes Bootstrap)-->
    <link rel="stylesheet" href="{{'/assets/css/styles.css' | relative_url}}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title> {{ page.title }} | RS Station </title>

  </head>

  <body>

    {% include navbar.html %}

    <div class="container px-4 px-lg-5">

      {{ content }}

    </div>

    {% include footer.html %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core theme JS-->
    <script src="{{'/assets/js/scripts.js' | relative_url}}"></script>

    <!-- Use MathJax, only when requested in the frontmatter -->
    {% if page.usemathjax %}
    <script id="MathJax-script" async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
    </script>
    {% endif %}
  </body>
</html>
