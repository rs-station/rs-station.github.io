name: Test build of site  # see https://github.com/rs-station/rs-station.github.io-preview/blob/main/README.md

on:
  pull_request:
    branches: [main]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build --baseurl "/rs-station.github.io-preview/pr-previews/pr-${{ github.event.pull_request.number }}"
        env:
          JEKYLL_ENV: production

      - name: Deploy to preview repo
        uses: peaceiris/actions-gh-pages@v3
        with:
          deploy_key: ${{ secrets.PREVIEW_DEPLOY_KEY }}
          external_repository: rs-station/rs-station.github.io-preview
          publish_branch: gh-pages
          publish_dir: ./_site
          destination_dir: pr-previews/pr-${{ github.event.pull_request.number }}
          keep_files: true  # important — don't wipe other previews

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = 'https://rs-station.github.io/rs-station.github.io-preview/pr-previews/pr-${{ github.event.pull_request.number }}/';
            const body = `Nice work! A preview showing what the website will look like with changes due to your PR has been deployed to: ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes('Preview deployed to:'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
