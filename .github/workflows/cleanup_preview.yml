name: Cleanup preview build of site

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  cleanup-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout preview repo
        uses: actions/checkout@v7
        with:
          ssh-key: ${{ secrets.PREVIEW_DEPLOY_KEY }}
          repository: rs-station/rs-station.github.io-preview
          ref: gh-pages

      - name: Remove PR preview directory
        run: |
          PR_DIR="pr-previews/pr-${{ github.event.pull_request.number }}"
          if [ -d "$PR_DIR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "$PR_DIR"
            git commit -m "Remove preview for pr-${{ github.event.pull_request.number }}"
            git push
          else
            echo "No preview directory found at $PR_DIR, skipping."
          fi
